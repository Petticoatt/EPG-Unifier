services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      EPG_DOMAIN: ${EPG_DOMAIN:?Set EPG_DOMAIN in .env}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./data/output:/srv:ro
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
